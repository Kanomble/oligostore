x-app-service: &app-service
  build: ./oligostore
  volumes:
    - ./oligostore:/app
    - ./media:/app/media
  env_file:
    - .env
  depends_on:
    - db
    - redis

services:
  web:
    <<: *app-service
    container_name: oligostore_web
    command: >
      sh -c "
      npm ci &&
      npx tailwindcss -c ./tailwind.config.cjs -i ./static/css/src/styles.css -o ./static/css/dist/styles.css --minify &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"

  db:
    image: postgres:15
    container_name: oligostore_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: oligostore_redis
    ports:
      - "6379:6379"

  worker:
    <<: *app-service
    container_name: oligostore_worker
    command: celery -A oligostore worker -l info

  #nginx:
  #  image: nginx:latest
